<!DOCTYPE html>
<html>

<head>
    <style>
        html {
            background: #ffffff;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #0B1929;
            font-family: Arial, sans-serif;
            display: flex;
        }

        .left-bar {
            width: 8pt;
            height: 405pt;
            background: #17A2B8;
            position: absolute;
            left: 0;
            top: 0;
        }

        .content {
            margin: 80pt 60pt 40pt 40pt;
            display: flex;
            flex-direction: column;
        }

        .tag {
            display: inline-block;
            background: #17A2B8;
            border-radius: 4pt;
            padding: 4pt 14pt;
            margin-bottom: 20pt;
            width: fit-content;
        }

        .tag p {
            color: #ffffff;
            font-size: 10pt;
            margin: 0;
        }

        h1 {
            color: #ffffff;
            font-size: 34pt;
            margin: 0 0 12pt 0;
        }

        h2 {
            color: #5DADE2;
            font-size: 18pt;
            font-weight: 400;
            margin: 0 0 40pt 0;
        }

        .meta {
            margin-top: auto;
        }

        .meta p {
            color: #7F8C8D;
            font-size: 10pt;
            margin: 0 0 4pt 0;
        }

        .accent-line {
            width: 60pt;
            height: 3pt;
            background: #17A2B8;
            margin-bottom: 16pt;
            border-radius: 2pt;
        }

        .right-deco {
            position: absolute;
            right: 40pt;
            top: 60pt;
            width: 200pt;
            height: 280pt;
            border: 2pt solid rgba(23, 162, 184, 0.2);
            border-radius: 12pt;
        }

        .right-inner {
            position: absolute;
            right: 55pt;
            top: 80pt;
            width: 170pt;
            height: 240pt;
            border: 1pt solid rgba(23, 162, 184, 0.1);
            border-radius: 8pt;
        }
    </style>
</head>

<body>
    <div class="left-bar"></div>
    <div class="right-deco"></div>
    <div class="right-inner"></div>
    <div class="content">
        <div class="tag">
            <p>PERSONA &amp; JOURNEY</p>
        </div>
        <h1>用户画像与用户旅程</h1>
        <h2>深圳国际科技信息中心</h2>
        <div class="accent-line"></div>
        <div class="meta">
            <p>深圳市科技创新局 | 项目编号：SZCG2025001150</p>
            <p>2026年3月</p>
        </div>
    </div>
</body>

</html>
