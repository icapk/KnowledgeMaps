<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深圳国际科技信息中心 — 用户画像与用户旅程</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2035;
    --bg-card-hover: #1f2847;
    --border: rgba(99, 102, 241, 0.15);
    --border-active: rgba(99, 102, 241, 0.5);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #6366f1;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --accent-emerald: #10b981;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-pink: #ec4899;
    --accent-orange: #f97316;
    --gradient-hero: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
    --gradient-card: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(139,92,246,0.05));
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ===== Hero Section ===== */
  .hero {
    position: relative;
    padding: 80px 40px 60px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(99,102,241,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, rgba(6,182,212,0.08) 0%, transparent 50%);
    animation: heroGlow 8s ease-in-out infinite alternate;
  }
  @keyframes heroGlow {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-2%, 2%); }
  }
  .hero h1 {
    position: relative;
    font-size: 2.6rem;
    font-weight: 800;
    background: var(--gradient-hero);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  .hero p {
    position: relative;
    color: var(--text-secondary);
    font-size: 1.1rem;
    max-width: 700px;
    margin: 0 auto;
  }

  /* ===== Navigation Tabs ===== */
  .nav-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 40px 40px;
    flex-wrap: wrap;
  }
  .nav-tab {
    padding: 10px 24px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.3s ease;
  }
  .nav-tab:hover { border-color: var(--border-active); color: var(--text-primary); }
  .nav-tab.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
  }

  /* ===== Container ===== */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 40px 80px; }

  /* ===== Section ===== */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .section-title {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .icon { font-size: 2rem; }
  .section-subtitle { color: var(--text-secondary); margin-bottom: 40px; font-size: 1rem; }

  /* ===== Persona Cards ===== */
  .persona-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    margin-bottom: 60px;
  }
  .persona-card {
    background: var(--gradient-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    transition: all 0.35s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .persona-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 20px 20px 0 0;
  }
  .persona-card:hover {
    border-color: var(--border-active);
    transform: translateY(-4px);
    box-shadow: var(--shadow-glow);
  }
  .persona-card.selected {
    border-color: var(--accent-blue);
    box-shadow: 0 0 30px rgba(99,102,241,0.2);
  }
  .persona-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .persona-avatar {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .persona-name { font-size: 1.15rem; font-weight: 700; }
  .persona-role { font-size: 0.82rem; color: var(--text-secondary); margin-top: 2px; }
  .persona-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 4px;
  }
  .persona-pain {
    background: rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.2);
    border-radius: 12px;
    padding: 14px;
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .persona-pain strong { color: var(--accent-rose); font-size: 0.75rem; }
  .persona-systems {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .persona-sys-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    background: rgba(6,182,212,0.1);
    color: var(--accent-cyan);
    border: 1px solid rgba(6,182,212,0.2);
  }

  /* ===== Journey Section ===== */
  .journey-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 32px;
    animation: fadeIn 0.4s ease;
  }
  .journey-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .journey-user-tag {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 100px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .journey-desc {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  /* Journey Flow */
  .journey-flow {
    display: flex;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 8px;
  }
  .journey-step {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .journey-step:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 28px;
    right: -1px;
    width: 24px;
    height: 2px;
    z-index: 2;
  }
  .step-dot {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 14px;
    position: relative;
    z-index: 3;
  }
  .step-phase {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .step-action {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .step-system {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .step-value {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.78rem;
    color: var(--accent-emerald);
    line-height: 1.5;
  }
  .step-value .diamond { margin-right: 4px; }

  /* ===== Time Compare Bar ===== */
  .time-compare {
    display: flex;
    gap: 20px;
    margin-top: 24px;
    padding: 20px;
    background: rgba(99,102,241,0.05);
    border-radius: 14px;
    border: 1px solid rgba(99,102,241,0.1);
  }
  .time-item { flex: 1; }
  .time-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
  .time-bar-bg {
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    margin-bottom: 6px;
  }
  .time-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }
  .time-value { font-size: 0.85rem; font-weight: 700; }

  /* ===== Stats ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 50px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  .stat-number {
    font-size: 2.2rem;
    font-weight: 800;
    background: var(--gradient-hero);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }

  /* ===== Matrix ===== */
  .matrix-container {
    overflow-x: auto;
    margin-bottom: 50px;
  }
  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }
  .matrix-table th, .matrix-table td {
    padding: 10px 8px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .matrix-table th {
    background: rgba(99,102,241,0.1);
    font-weight: 600;
    color: var(--text-primary);
    position: sticky;
    top: 0;
  }
  .matrix-table th:first-child, .matrix-table td:first-child {
    text-align: left;
    font-weight: 600;
    min-width: 100px;
    position: sticky;
    left: 0;
    background: var(--bg-card);
    z-index: 1;
  }
  .matrix-dot {
    width: 20px; height: 20px;
    border-radius: 6px;
    display: inline-block;
  }
  .matrix-dot.active { background: var(--accent-blue); box-shadow: 0 0 8px rgba(99,102,241,0.4); }
  .matrix-dot.inactive { background: rgba(255,255,255,0.04); }

  /* Color themes per persona */
  .color-blue { --pc: var(--accent-blue); }
  .color-purple { --pc: var(--accent-purple); }
  .color-cyan { --pc: var(--accent-cyan); }
  .color-emerald { --pc: var(--accent-emerald); }
  .color-amber { --pc: var(--accent-amber); }
  .color-rose { --pc: var(--accent-rose); }
  .color-pink { --pc: var(--accent-pink); }
  .color-orange { --pc: var(--accent-orange); }

  .persona-card.color-blue::before { background: var(--accent-blue); }
  .persona-card.color-purple::before { background: var(--accent-purple); }
  .persona-card.color-cyan::before { background: var(--accent-cyan); }
  .persona-card.color-emerald::before { background: var(--accent-emerald); }
  .persona-card.color-amber::before { background: var(--accent-amber); }
  .persona-card.color-rose::before { background: var(--accent-rose); }
  .persona-card.color-pink::before { background: var(--accent-pink); }
  .persona-card.color-orange::before { background: var(--accent-orange); }

  /* Scrollbar */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (max-width: 768px) {
    .hero h1 { font-size: 1.8rem; }
    .container { padding: 0 16px 60px; }
    .hero { padding: 50px 16px 40px; }
    .nav-tabs { padding: 0 16px 24px; }
    .journey-panel { padding: 20px; }
    .persona-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

// ===== RENDER PERSONAS =====
function renderPersonas() {
  const grid = document.getElementById('personaGrid');
  grid.innerHTML = personas.map(p => `
    <div class="persona-card color-${p.color}" onclick="this.classList.toggle('selected')">
      <div class="persona-header">
        <div class="persona-avatar" style="background:rgba(var(--pc-rgb,99,102,241),0.15)">${p.emoji}</div>
        <div>
          <div class="persona-name">${p.id} ${p.name}</div>
          <div class="persona-role">${p.role} · ${p.age}</div>
          <span class="persona-tag" style="background:rgba(var(--pc-rgb,99,102,241),0.15);color:var(--accent-${p.color})">涉及 ${p.count} 个子系统</span>
        </div>
      </div>
      <div class="persona-pain"><strong>🔥 核心痛点</strong><br>${p.pain}</div>
      <div class="persona-systems">${p.systems.map(s => `<span class="persona-sys-tag">${s}</span>`).join('')}</div>
    </div>
  `).join('');
}

// ===== RENDER MATRIX =====
function renderMatrix() {
  const table = document.getElementById('matrixTable');
  const sysShort = ['门户','展示','资源','智库','决策','专题','交流','搜索','算法','指数','科研','智算','图谱','情报','大数据','要素','科数'];
  let html = '<thead><tr><th>用户</th>' + sysShort.map(s => `<th>${s}</th>`).join('') + '</tr></thead><tbody>';
  personas.forEach(p => {
    const row = matrixData[p.id];
    html += `<tr><td>${p.emoji} ${p.name}</td>` + row.map(v => `<td><span class="matrix-dot ${v?'active':'inactive'}"></span></td>`).join('') + '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

      <div class="journey-panel">
        <div class="journey-title">🗺️ ${j.title}</div>
        <div class="journey-desc">以 ${personas.find(p=>p.id===j.user).emoji} ${personas.find(p=>p.id===j.user).name}视角展示完整用户旅程</div>
        <div class="journey-flow">
          ${j.steps.map((s,i) => `
            <div class="journey-step">
              <div class="step-dot" style="background:${colors[i%colors.length]}22;border:2px solid ${colors[i%colors.length]}">${s.icon}</div>
              <div class="step-phase" style="color:${colors[i%colors.length]}">${s.phase}</div>
              <div class="step-action">${s.action}</div>
              <div class="step-system">${s.system}</div>
              <div class="step-value"><span class="diamond">💎</span> ${s.value}</div>
            </div>
          `).join('')}
        </div>
        <div class="time-compare">
          <div class="time-item">
            <div class="time-label">⏱️ ${j.timeOld}</div>
            <div class="time-bar-bg"><div class="time-bar-fill" style="width:${j.oldPct}%;background:var(--accent-rose)"></div></div>
          </div>
          <div class="time-item">
            <div class="time-label">🚀 ${j.timeNew}</div>
            <div class="time-bar-bg"><div class="time-bar-fill" style="width:${j.newPct}%;background:var(--accent-emerald)"></div></div>
          </div>
        </div>
      </div>
    `;
  });
}

// ===== TAB SWITCHING =====
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('sec-' + tab.dataset.tab);
    if (target) target.classList.add('active');
  });
});

// ===== INIT =====
renderPersonas();
renderMatrix();
renderSubsystems();
</script>
</body>
</html>
