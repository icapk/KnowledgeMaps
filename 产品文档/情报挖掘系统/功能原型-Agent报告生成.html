    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --border: rgba(99, 102, 241, .15);
            --border-active: rgba(99, 102, 241, .5);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #6366f1;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --gradient-hero: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7
        }

        .header {
            display: flex;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border)
        }

        .header .logo {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .header .breadcrumb {
            margin-left: 16px;
            color: var(--text-muted);
            font-size: .85rem
        }

        .header .user-badge {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(244, 63, 94, .1);
            border: 1px solid rgba(244, 63, 94, .2);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: .82rem;
            color: var(--accent-rose)
        }

        .page-hero {
            padding: 48px 40px 32px;
            position: relative;
            overflow: hidden
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 160%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 50%, rgba(6, 182, 212, .1) 0%, transparent 60%);
            animation: pulse 6s ease-in-out infinite alternate
        }

        @keyframes pulse {
            0% {
                transform: translate(0, 0)
            }

            100% {
                transform: translate(-3%, 2%)
            }
        }

        .page-hero h1 {
            position: relative;
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px
        }

        .page-hero p {
            position: relative;
            color: var(--text-secondary);
            font-size: .95rem;
            max-width: 800px
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 60px
        }

        .grid-sidebar {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all .3s
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .badge {

            padding: 3px 10px;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 600

        .badge-blue {

            color: var(--accent-blue)
        }

            background: rgba(16, 185, 129, .15);
            color: var(--accent-emerald)
        }

            background: rgba(245, 158, 11, .15);
            color: var(--accent-amber)
        }

        .badge-rose {
            background: rgba(244, 63, 94, .15);
            color: var(--accent-rose)
        }

            color: var(--accent-cyan)
        }

        .badge-purple {
            background: rgba(139, 92, 246, .15);
            color: var(--accent-purple)
        }

            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: .9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            height: 80px;
            transition: border .3s
        }

        .chat-textarea:focus {
            border-color: var(--accent-cyan)
        }

        .chat-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            color: #fff;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all .3s
        }

        .chat-btn:hover {
            box-shadow: 0 4px 24px rgba(6, 182, 212, .4)
        }

        .chat-btn:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .progress-area {
            margin-bottom: 24px
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px
        }

        .progress-title {
            font-size: .85rem;
            font-weight: 600
        }

        .progress-pct {
            font-size: .85rem;
            font-weight: 700;
            color: var(--accent-cyan)
        }

        .progress-bar-bg {
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .06);
            overflow: hidden;
            margin-bottom: 16px
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--gradient-hero);
            transition: width .5s ease
        }

        /* Tool call log */
        .tool-log {
            max-height: 400px;
            overflow-y: auto
        }

        .tool-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-size: .78rem

        .tool-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .85rem;
            flex-shrink: 0

            font-weight: 600;
            color: var(--text-primary)
        }

        .tool-detail {
            color: var(--text-secondary);
            margin-top: 2px
        }

        .tool-status {
            margin-left: auto;
            flex-shrink: 0
        }

            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden

        .report-header {
            padding: 24px;

            display: flex;
            align-items: center;

        .report-title {

        .report-meta {

            color: var(--text-muted)

            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: .78rem;
            cursor: pointer;
            transition: all .3s
        }

        .report-action-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary)
        }

        .report-action-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff
        }

        .report-body {
            padding: 28px;
            font-size: .88rem;
            line-height: 1.9
        }

        .report-body h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 24px 0 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            color: var(--accent-cyan)
        }

        .report-body h2:first-child {
            margin-top: 0
        }

        .report-body h3 {
            font-size: .95rem;
            font-weight: 600;
            margin: 16px 0 8px;
            color: var(--text-primary)
        }

        .report-body p {
            color: var(--text-secondary);
            margin-bottom: 12px
        }

        .report-body .source-link {

            font-size: .75rem;

        .report-body .source-link:hover {

            border: 1px solid rgba(244, 63, 94, .2);
            color: var(--text-secondary)
        }

        .report-body .highlight-red strong {
            color: var(--accent-rose)
        }

        .report-body .highlight-green {
            background: rgba(16, 185, 129, .06);
            border: 1px solid rgba(16, 185, 129, .2);
            color: var(--text-secondary)
        }

        .report-body .highlight-green strong {

        .report-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: .8rem
        }

        .report-body th,

            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, .06);
            text-align: left
        }

        .report-body th {
            background: rgba(99, 102, 241, .06);
            font-weight: 600;
            font-size: .75rem;
            color: var(--text-secondary)
        }

        .report-body .figure {

            padding: 20px;
            margin: 16px 0;
            background: rgba(99, 102, 241, .03);

        /* Source tooltip */
        .source-tooltip {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--accent-blue);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: .78rem;
            max-width: 320px;
            z-index: 100;
            display: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .6)
        }

        @media(max-width:900px) {
            .grid-sidebar {
                grid-template-columns: 1fr
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 2px
        }
    </style>
</head>

        let currentTool = 0;
        let animTimer = null;

        function startGeneration() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '⏳ Agent 工作中...';
            document.getElementById('progressArea').style.display = 'block';
            document.getElementById('toolLogCard').style.display = 'block';
            currentTool = 0;
            animTimer = setInterval(addToolCall, 600);
        }

        function addToolCall() {
            if (currentTool >= toolCalls.length) {
                clearInterval(animTimer);
                showReport();
                return;
            }
            const t = toolCalls[currentTool];
            const log = document.getElementById('toolLog');
            const item = document.createElement('div');
            item.className = 'tool-item';
            item.innerHTML = `
    <div class="tool-icon" style="background:${t.color}22;color:${t.color}">${t.icon}</div>
    <div><div class="tool-name">${t.name}</div><div class="tool-detail">${t.detail}</div></div>
    <div class="tool-status"><span class="badge badge-emerald">✅ ${t.time}</span></div>
  `;
            item.style.animation = 'fadeIn .3s ease';
            log.insertBefore(item, log.firstChild);
            currentTool++;
            const pct = Math.round((currentTool / toolCalls.length) * 100);
            document.getElementById('progressPct').textContent = pct + '%';
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('toolCount').textContent = `${currentTool}/${toolCalls.length}轮`;
            log.scrollTop = 0;
        }

        function showReport() {
            document.getElementById('startBtn').textContent = '✅ 报告生成完毕';
            document.getElementById('reportPanel').style.display = 'block';
            document.getElementById('reportPanel').style.animation = 'fadeIn .6s ease';

            document.getElementById('reportPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
